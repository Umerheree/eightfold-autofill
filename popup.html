<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zapply Autofill</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f8ff;
      color: #1e1b4b;
    }

    .header {
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      padding: 16px 20px 14px;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header svg { flex-shrink: 0; }

    .header-text h1 { font-size: 15px; font-weight: 700; }
    .header-text p  { font-size: 11px; opacity: 0.8; margin-top: 2px; }

    .body { padding: 16px 20px; }

    .status-bar {
      background: white;
      border: 1px solid #e0e0f0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #555;
      margin-bottom: 14px;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #6b7280;
      flex-shrink: 0;
    }
    .status-dot.ready  { background: #22c55e; }
    .status-dot.busy   { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot.error  { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: #4F46E5;
      color: white;
    }
    .btn-primary:hover:not(:disabled) { background: #4338CA; }
    .btn-primary:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }

    .note {
      margin-top: 12px;
      font-size: 11px;
      color: #888;
      line-height: 1.5;
      background: #f0f0ff;
      border-radius: 6px;
      padding: 8px 10px;
    }

    .note strong { color: #4F46E5; }

    footer {
      padding: 10px 20px;
      border-top: 1px solid #e8e8f0;
      font-size: 10px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="header">
  <!-- Bolt icon -->
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
    <rect width="24" height="24" rx="6" fill="white" fill-opacity="0.2"/>
    <path d="M13 2L4.09 12.96h7.41L10 22l9.91-11H12.5L13 2z" fill="white"/>
  </svg>
  <div class="header-text">
    <h1>Zapply Autofill</h1>
    <p>Eightfold AI · PTC Careers</p>
  </div>
</div>

<div class="body">
  <div class="status-bar">
    <div class="status-dot" id="dot"></div>
    <span id="status-text">Checking page…</span>
  </div>

  <button class="btn btn-primary" id="fillBtn" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M12 5v14M5 12l7 7 7-7"/>
    </svg>
    Start Autofill
  </button>

  <div class="note">
    <strong>Note:</strong> File uploads (resume &amp; cover letter) require manual selection due to browser security restrictions. All other fields will be filled automatically.
  </div>
</div>

<footer>Zapply · Pre-Interview Assessment Build</footer>

<script src="popup.js"></script>
</body>
</html>
